<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catnip Forge — 启动中</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Microsoft YaHei UI", sans-serif;
        background: transparent;
        --navy: #102e58;
        --navy-soft: #315277;
        --leaf: #80bd37;
        --leaf-bright: #a9d943;
        --surface: rgba(255, 255, 251, 0.95);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        user-select: none;
      }

      body {
        padding: 10px;
        background: transparent;
      }

      .splash {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border: 1px solid rgba(16, 46, 88, 0.13);
        border-radius: 28px;
        background:
          radial-gradient(circle at 91% 13%, rgba(169, 217, 67, 0.22), transparent 31%),
          radial-gradient(circle at 68% 108%, rgba(128, 189, 55, 0.16), transparent 42%),
          linear-gradient(145deg, var(--surface) 0%, rgba(246, 251, 237, 0.97) 100%);
        box-shadow:
          0 28px 70px rgba(7, 24, 45, 0.22),
          0 6px 20px rgba(7, 24, 45, 0.11),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        opacity: 0;
        transform: translateY(5px) scale(0.992);
        animation: reveal 420ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .grain {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.18;
        background-image: radial-gradient(rgba(16, 46, 88, 0.18) 0.45px, transparent 0.55px);
        background-size: 7px 7px;
        mask-image: linear-gradient(to bottom, black, transparent 62%);
      }

      .brandbar {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 88px;
        padding: 18px 25px 14px 28px;
        border-bottom: 1px solid rgba(16, 46, 88, 0.08);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--navy);
      }

      .brand-mark {
        width: 48px;
        height: 48px;
        object-fit: contain;
        filter: drop-shadow(0 5px 8px rgba(16, 46, 88, 0.12));
      }

      .brand-name {
        margin: 0;
        font-size: 27px;
        font-weight: 680;
        letter-spacing: -0.035em;
      }

      .brand-caption {
        margin-top: 2px;
        color: rgba(16, 46, 88, 0.56);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.13em;
      }

      .product-mark {
        width: 62px;
        height: 62px;
        object-fit: contain;
        filter: drop-shadow(0 7px 12px rgba(16, 46, 88, 0.13));
      }

      .content {
        position: relative;
        z-index: 2;
        width: 64%;
        padding: 35px 0 0 38px;
        color: var(--navy);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: #608d27;
        font-size: 11px;
        font-weight: 740;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 38px;
        font-weight: 720;
        line-height: 1.06;
        letter-spacing: -0.045em;
      }

      .tagline-cn {
        margin: 15px 0 0;
        color: var(--navy-soft);
        font-size: 17px;
        font-weight: 520;
        letter-spacing: -0.02em;
      }

      .cat {
        position: absolute;
        z-index: 1;
        right: -2px;
        bottom: -23px;
        width: 287px;
        height: 287px;
        object-fit: contain;
        filter: drop-shadow(0 18px 18px rgba(16, 46, 88, 0.16));
        transform-origin: 62% 100%;
        animation: cat-arrive 560ms 90ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .progress-area {
        position: absolute;
        z-index: 3;
        left: 38px;
        right: 38px;
        bottom: 28px;
        width: calc(100% - 350px);
      }

      .progress-copy {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 10px;
        color: rgba(16, 46, 88, 0.68);
        font-size: 12px;
        font-weight: 620;
      }

      #progress-value {
        min-width: 34px;
        color: var(--navy);
        font-variant-numeric: tabular-nums;
        text-align: right;
      }

      .progress-track {
        height: 7px;
        overflow: hidden;
        border: 1px solid rgba(16, 46, 88, 0.09);
        border-radius: 999px;
        background: rgba(16, 46, 88, 0.08);
        box-shadow: inset 0 1px 2px rgba(16, 46, 88, 0.07);
      }

      #progress-bar {
        position: relative;
        width: 8%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--leaf), var(--leaf-bright));
        box-shadow: 0 0 12px rgba(128, 189, 55, 0.38);
        will-change: width;
      }

      #progress-bar::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 42px;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.64));
        animation: breathe 1.4s ease-in-out infinite;
      }

      @keyframes reveal {
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes cat-arrive {
        from {
          opacity: 0;
          transform: translate(18px, 15px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translate(0, 0) scale(1);
        }
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.28;
        }
        50% {
          opacity: 0.9;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .splash,
        .cat,
        #progress-bar,
        #progress-bar::after {
          animation: none;
          transition: none;
        }

        .splash {
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="splash" aria-label="Catnip Forge 正在启动">
      <div class="grain" aria-hidden="true"></div>
      <header class="brandbar">
        <div class="brand">
          <img class="brand-mark" src="./splash-leaf.png" alt="" />
          <div>
            <p class="brand-name">Catnip Forge</p>
            <div class="brand-caption">CATNIP 硬件智能开发平台</div>
          </div>
        </div>
        <img class="product-mark" src="./splash-logo.png" alt="" />
      </header>

      <section class="content">
        <p class="eyebrow">Autonomous Hardware Development Agent</p>
        <h1>One prompt.<br />Working hardware.</h1>
        <p class="tagline-cn">一句话，让硬件跑起来。</p>
      </section>

      <img class="cat" src="./splash-cat.png" alt="Catnip Forge 小助手" />

      <section class="progress-area" aria-live="polite">
        <div class="progress-copy">
          <span id="status">正在唤醒 Catnip Forge</span>
          <span id="progress-value">8%</span>
        </div>
        <div
          class="progress-track"
          role="progressbar"
          aria-label="启动进度"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="8"
        >
          <div id="progress-bar"></div>
        </div>
      </section>
    </main>

    <script>
      const SPLASH_START_PROGRESS = 8;
      const SPLASH_WAIT_PROGRESS = 94;
      const SPLASH_DEFAULT_DURATION_MS = 5000;
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const statusElement = document.getElementById('status');
      const progressValueElement = document.getElementById('progress-value');
      const progressBarElement = document.getElementById('progress-bar');
      const progressTrackElement = document.querySelector('.progress-track');
      let displayedProgress = SPLASH_START_PROGRESS;
      let timelineDurationMs = SPLASH_DEFAULT_DURATION_MS;
      let timelineFrame = 0;
      let timelineRunning = false;

      const renderProgress = (progress) => {
        displayedProgress = Math.max(0, Math.min(100, Number(progress) || 0));
        const rounded = Math.round(displayedProgress);
        progressValueElement.textContent = `${rounded}%`;
        progressBarElement.style.width = `${displayedProgress.toFixed(2)}%`;
        progressTrackElement.setAttribute('aria-valuenow', String(rounded));
      };

      const stopTimeline = () => {
        if (timelineFrame) cancelAnimationFrame(timelineFrame);
        timelineFrame = 0;
        timelineRunning = false;
      };

      window.setSplashStage = (status) => {
        statusElement.textContent = String(status || '正在启动');
      };

      window.startSplashTimeline = (durationMs = SPLASH_DEFAULT_DURATION_MS) => {
        stopTimeline();
        timelineDurationMs = Math.max(1, Number(durationMs) || SPLASH_DEFAULT_DURATION_MS);
        renderProgress(SPLASH_START_PROGRESS);

        if (reduceMotion) {
          renderProgress(SPLASH_WAIT_PROGRESS);
          return;
        }

        const startedAt = performance.now();
        timelineRunning = true;
        const advance = (now) => {
          const elapsedRatio = Math.min(1, (now - startedAt) / timelineDurationMs);
          renderProgress(
            SPLASH_START_PROGRESS + (SPLASH_WAIT_PROGRESS - SPLASH_START_PROGRESS) * elapsedRatio,
          );
          if (elapsedRatio < 1) {
            timelineFrame = requestAnimationFrame(advance);
          } else {
            timelineFrame = 0;
            timelineRunning = false;
          }
        };
        timelineFrame = requestAnimationFrame(advance);
      };

      window.completeSplashProgress = (status) => {
        window.setSplashStage(status || '准备就绪');
        stopTimeline();

        if (reduceMotion) {
          renderProgress(100);
          return;
        }

        const startProgress = displayedProgress;
        const startedAt = performance.now();
        const completionDurationMs = 180;
        timelineRunning = true;
        const finish = (now) => {
          const elapsedRatio = Math.min(1, (now - startedAt) / completionDurationMs);
          const easedRatio = 1 - Math.pow(1 - elapsedRatio, 3);
          renderProgress(startProgress + (100 - startProgress) * easedRatio);
          if (elapsedRatio < 1) {
            timelineFrame = requestAnimationFrame(finish);
          } else {
            timelineFrame = 0;
            timelineRunning = false;
          }
        };
        timelineFrame = requestAnimationFrame(finish);
      };

      window.forceSplashProgressForTest = (progress, status) => {
        stopTimeline();
        window.setSplashStage(status);
        renderProgress(progress);
      };

      window.getSplashProgressState = () => ({
        defaultDurationMs: SPLASH_DEFAULT_DURATION_MS,
        durationMs: timelineDurationMs,
        progress: displayedProgress,
        running: timelineRunning,
        reducedMotion: reduceMotion,
      });

      window.restartSplashTimelineForTest = (durationMs) => {
        window.startSplashTimeline(durationMs);
      };
    </script>
  </body>
</html>
